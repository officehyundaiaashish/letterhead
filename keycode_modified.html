<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Key Code Form</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f4f4f2;
      --surface: #ffffff;
      --surface2: #f0f0ee;
      --border: #e3e3df;
      --text: #181816;
      --text2: #6a6a67;
      --text3: #9a9a97;
      --accent: #002C5F;
      --accent-h: #001F47;
      --accent-s: #e8edf5;
      --radius: 10px;
      --radius-lg: 16px;
      --shadow: 0 1px 3px rgba(0,0,0,.06), 0 4px 12px rgba(0,0,0,.04);
      --shadow-lg: 0 4px 24px rgba(0,0,0,.09);
      --font: "DM Sans", sans-serif;
      --mono: "DM Mono", monospace;
      --tr: 180ms ease;
    }
    [data-theme=dark] {
      --bg: #111110;
      --surface: #1c1c1a;
      --surface2: #232321;
      --border: #2d2d2b;
      --text: #f0f0ee;
      --text2: #888885;
      --text3: #525250;
      --accent: #4D8FD6;
      --accent-h: #3A7BC8;
      --accent-s: #001A3A;
      --shadow: 0 1px 4px rgba(0,0,0,.3), 0 4px 16px rgba(0,0,0,.2);
      --shadow-lg: 0 4px 28px rgba(0,0,0,.45);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 14px; }
    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      padding: 20px;
      transition: background var(--tr), color var(--tr);
    }
    .ph {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 20px;
      flex-wrap: wrap;
      gap: 12px;
    }
    .ph-title {
      font-size: 20px;
      font-weight: 600;
      letter-spacing: -.4px;
      margin-bottom: 4px;
    }
    .ph-sub {
      font-size: 12.5px;
      color: var(--text2);
    }
    .chip {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 4px 10px;
      background: var(--accent-s);
      color: var(--accent);
      border-radius: 20px;
      font-size: 11px;
      font-weight: 500;
    }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 18px 20px;
      margin-bottom: 14px;
      transition: background var(--tr), border-color var(--tr);
    }
    .card-title {
      font-size: 13.5px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 7px;
      margin-bottom: 14px;
      color: var(--text);
      justify-content: space-between;
    }
    .card-title svg {
      color: var(--accent);
    }
    .fg {
      display: grid;
      gap: 12px;
    }
    .fg.c3 {
      grid-template-columns: repeat(3, 1fr);
    }
    .field {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }
    .field.s2 {
      grid-column: span 2;
    }
    .field.s3 {
      grid-column: span 3;
    }
    .field label {
      font-size: 12px;
      font-weight: 500;
      color: var(--text2);
    }
    .req {
      color: #d64545;
    }
    .field input, .field select, .field textarea {
      padding: 8px 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--bg);
      color: var(--text);
      font-size: 13px;
      font-family: var(--font);
      transition: all var(--tr);
    }
    .field input:focus, .field select:focus, .field textarea:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-s);
    }
    .vrow {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 16px;
      margin-bottom: 10px;
      position: relative;
      transition: all var(--tr);
    }
    .vrow:hover {
      border-color: var(--accent);
    }
    .vrow-num {
      font-size: 11px;
      font-weight: 600;
      color: var(--text3);
      margin-bottom: 10px;
      letter-spacing: .5px;
    }
    .vrow-rm {
      position: absolute;
      top: 12px;
      right: 12px;
      width: 24px;
      height: 24px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all var(--tr);
    }
    .vrow-rm:hover {
      background: #d64545;
      border-color: #d64545;
      color: white;
    }
    .divhr {
      height: 1px;
      background: var(--border);
      margin: 20px 0;
    }
    .btn-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .btn {
      padding: 10px 16px;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all var(--tr);
      display: inline-flex;
      align-items: center;
      gap: 7px;
      font-family: var(--font);
    }
    .btn-p {
      background: var(--accent);
      color: white;
    }
    .btn-p:hover {
      background: var(--accent-h);
    }
    .btn-g {
      background: var(--surface2);
      color: var(--text);
      border: 1px solid var(--border);
    }
    .btn-g:hover {
      background: var(--border);
    }
    .btn:disabled {
      opacity: .5;
      cursor: not-allowed;
    }
    #loader {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.25);
      backdrop-filter: blur(2px);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 500;
    }
    #loader.show {
      display: flex;
    }
    .ld-card {
      background: var(--surface);
      border-radius: 16px;
      padding: 28px 36px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      box-shadow: var(--shadow-lg);
    }
    .spin {
      width: 32px;
      height: 32px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: sp 650ms linear infinite;
    }
    @keyframes sp {
      to { transform: rotate(360deg); }
    }
    .ld-card p {
      font-size: 13.5px;
      color: var(--text2);
      font-weight: 500;
    }
    #toast {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 11px 16px;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12.5px;
      font-weight: 500;
      box-shadow: var(--shadow-lg);
      opacity: 0;
      transition: all 280ms ease;
      z-index: 600;
    }
    #toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
    #toast.ok {
      color: #16a34a;
      border-color: #16a34a;
    }
    #toast.err {
      color: #d64545;
      border-color: #d64545;
    }
    #toast.info {
      color: var(--accent);
      border-color: var(--accent);
    }
    @media(max-width:768px) {
      .fg.c3 { grid-template-columns: 1fr; }
      .field.s2, .field.s3 { grid-column: span 1; }
    }
  </style>

<!-- Shared Letterhead UI CSS injected -->
<style>

@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');

/* CSS Variables matching main website theme system */
:root {
  --bg-page: #f4f4f2;
  --bg-card: #ffffff;
  --bg-input: #ffffff;
  --bg-hover: #f0f0ee;
  --bg-active: #e3e3df;
  
  --text-main: #181816;
  --text-label: #181816;
  --text-muted: #6a6a67;
  --text-placeholder: #9a9a97;
  
  --border-light: #e3e3df;
  --border-input: #e3e3df;
  --border-focus: #002C5F;
  
  --accent-bg: #002C5F;
  --accent-text: #ffffff;
  --focus-ring: rgba(0, 44, 95, 0.1);
  --danger-color: #ef4444;
}

[data-theme=dark] {
  --bg-page: #111110;
  --bg-card: #1c1c1a;
  --bg-input: #1c1c1a;
  --bg-hover: #232321;
  --bg-active: #2d2d2b;
  
  --text-main: #f0f0ee;
  --text-label: #f0f0ee;
  --text-muted: #888885;
  --text-placeholder: #525250;
  
  --border-light: #2d2d2b;
  --border-input: #2d2d2b;
  --border-focus: #4D8FD6;
  
  --accent-bg: #4D8FD6;
  --accent-text: #111110;
  --focus-ring: rgba(77, 143, 214, 0.2);
  --danger-color: #f87171;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body { 
  font-family: 'Inter', sans-serif; 
  background: var(--bg-page); 
  color: var(--text-main); 
  min-height: 100vh; 
  display: flex; 
  align-items: flex-start; 
  justify-content: center; 
  padding: 40px 20px 80px;
}

.card { 
  background: var(--bg-card); 
  border-radius: 12px; 
  width: 100%; 
  max-width: 800px; 
  box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03); 
  overflow: hidden;
  border: 1px solid var(--border-light);
}

.card-header { 
  padding: 24px 32px 20px; 
  border-bottom: 1px solid var(--border-light); 
}
.card-header h1 { font-size: 20px; font-weight: 600; color: var(--text-main); letter-spacing: -0.01em; }
.card-header p { font-size: 14px; color: var(--text-muted); margin-top: 4px; }

/* Tabs (Mode Picker) */
.mode-wrap { margin: 20px 32px 0; display: none; }
.mode-wrap.show { display: block; }
.mode-lbl { font-size: 9.5px; font-weight: 600; letter-spacing: .1em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 7px; }
.mode-btns { display: flex; gap: 6px; }
.mode-btn { 
  flex: 1; height: 35px; border-radius: 7px; border: 1.5px solid var(--border-input); 
  background: var(--bg-hover); font-size: 13px; font-weight: 500; color: var(--text-muted); 
  cursor: pointer; transition: all .18s; outline: none;
}
.mode-btn:focus { border-color: var(--border-focus); box-shadow: 0 0 0 3px var(--focus-ring); }
.mode-btn:hover { border-color: var(--text-muted); color: var(--text-main); }
.mode-btn.active { background: var(--accent-bg); border-color: var(--accent-bg); color: var(--accent-text); }

/* History Section */
.history-wrap { padding: 24px 32px 32px; display: none; }
.history-wrap.show { display: block; }
.hist-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
.hist-title { font-size: 14px; font-weight: 600; color: var(--text-main); }
.hist-clr { font-size: 13px; color: var(--text-muted); cursor: pointer; background: none; border: none; transition: color 0.2s; padding: 0; outline: none; }
.hist-clr:hover, .hist-clr:focus { color: var(--danger-color); }

.search-input { 
  width: 100%; height: 42px; border: 1px solid var(--border-input); border-radius: 8px; 
  padding: 0 14px; font-size: 14px; margin-bottom: 16px; outline: none; transition: all 0.2s;
  background: var(--bg-hover); color: var(--text-main);
}
.search-input:focus { border-color: var(--border-focus); background: var(--bg-input); box-shadow: 0 0 0 3px var(--focus-ring); }
.search-input::placeholder { color: var(--text-placeholder); }

.hist-list { display: flex; flex-direction: column; gap: 8px; max-height: 400px; overflow-y: auto; padding-right: 4px; }
.hist-item { 
  display: flex; align-items: center; gap: 12px; padding: 14px 16px; 
  border: 1px solid var(--border-light); border-radius: 8px; cursor: pointer; 
  background: var(--bg-input); transition: all 0.2s; outline: none;
}
.hist-item:hover, .hist-item:focus { border-color: var(--border-input); background: var(--bg-hover); }
.hi-info { flex: 1; min-width: 0; }
.hi-name { font-size: 14px; font-weight: 600; color: var(--text-main); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.hi-meta { font-size: 12px; color: var(--text-muted); margin-top: 4px; display: flex; align-items: center; gap: 8px; }
.hi-mode { font-size: 10px; padding: 2px 6px; border-radius: 4px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.02em; }
.hi-mode.tyre { background: rgba(59, 130, 246, 0.15); color: #3b82f6; }
.hi-mode.battery { background: rgba(245, 158, 11, 0.15); color: #d97706; }
.hi-del { background: none; border: none; color: var(--border-input); cursor: pointer; transition: color 0.2s; display: flex; align-items: center; outline: none;}
.hi-del:hover, .hi-del:focus { color: var(--danger-color); }

/* Forms - CSS Grid Setup */
.form-section { padding: 24px 32px 0; }
.sec-lbl { font-size: 12px; font-weight: 600; text-transform: uppercase; color: var(--text-muted); margin-bottom: 16px; border-bottom: 1px solid var(--border-light); padding-bottom: 8px; letter-spacing: 0.05em; }
.grid-wrap { display: grid; grid-template-columns: 1fr 1fr; gap: 16px 24px; }

.field-col { display: flex; flex-direction: column; gap: 6px; min-width: 0; }
.field-col label { font-size: 13px; font-weight: 500; color: var(--text-label); white-space: nowrap; overflow: hidden; text-overflow: ellipsis;}
.field-col input { 
  height: 42px; border: 1px solid var(--border-input); border-radius: 8px; 
  padding: 0 14px; font-size: 14px; color: var(--text-main); background: var(--bg-input); 
  transition: all 0.2s; width: 100%; outline: none; font-family: 'Inter', sans-serif;
}
.field-col input::placeholder { color: var(--text-placeholder); }
.field-col input:focus { border-color: var(--border-focus); box-shadow: 0 0 0 3px var(--focus-ring); }
.field-col input.pre { color: var(--text-muted); }

/* Custom Animated Select / Dropdown */
.custom-select-wrap { position: relative; user-select: none; width: 100%; }
.custom-select-trigger { 
  height: 42px; border: 1px solid var(--border-input); border-radius: 8px; 
  padding: 0 14px; background: var(--bg-input); display: flex; align-items: center; 
  justify-content: space-between; cursor: pointer; transition: all 0.2s ease; width: 100%; outline: none;
}
.custom-select-trigger:hover { border-color: var(--text-placeholder); }
.custom-select-trigger:focus { border-color: var(--border-focus); box-shadow: 0 0 0 3px var(--focus-ring); }
.custom-select-trigger.active { border-color: var(--border-focus); box-shadow: 0 0 0 3px var(--focus-ring); }
.cs-val { font-size: 14px; color: var(--text-main); flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; padding-right: 10px; }
.cs-val.empty { color: var(--text-placeholder); }
.cs-arr { color: var(--text-placeholder); transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); display: flex; align-items: center;}
.custom-select-trigger.active .cs-arr { transform: rotate(180deg); color: var(--text-main); }

.custom-select-opts { 
  position: absolute; top: calc(100% + 6px); left: 0; right: 0; z-index: 500; 
  background: var(--bg-card); border: 1px solid var(--border-input); border-radius: 8px; 
  box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.2); max-height: 220px; overflow-y: auto; 
  opacity: 0; transform: translateY(-10px) scaleY(0.95); transform-origin: top; 
  pointer-events: none; transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); 
}
.custom-select-opts.open { opacity: 1; transform: translateY(0) scaleY(1); pointer-events: all; }
.cs-opt { padding: 12px 14px; font-size: 13px; color: var(--text-main); cursor: pointer; transition: background 0.15s; border-bottom: 1px solid var(--border-light); outline: none;}
.cs-opt:last-child { border-bottom: none; }
.cs-opt:hover, .cs-opt:focus { background: var(--bg-hover); font-weight: 500; }

/* Date picker */
.date-trigger { 
  height: 42px; display: flex; align-items: center; padding: 0 14px; 
  cursor: pointer; user-select: none; gap: 8px; border: 1px solid var(--border-input); 
  border-radius: 8px; background: var(--bg-input); transition: all 0.2s ease; position: relative; width: 100%; outline: none;
}
.date-trigger:hover { border-color: var(--text-placeholder); }
.date-trigger:focus { border-color: var(--border-focus); box-shadow: 0 0 0 3px var(--focus-ring); }
.date-trigger.active { border-color: var(--border-focus); box-shadow: 0 0 0 3px var(--focus-ring); }
.date-icon { color: var(--text-placeholder); display: flex; align-items: center; }
.dval { font-size: 14px; color: var(--text-main); flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.dval.empty { color: var(--text-placeholder); }

/* Calendar Popup */
.cal-pop { 
  position: absolute; top: calc(100% + 8px); left: 0; z-index: 400; 
  background: var(--bg-card); border: 1px solid var(--border-input); border-radius: 12px; 
  padding: 16px; box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.2); 
  width: 260px; opacity: 0; transform: translateY(-8px); pointer-events: none; 
  transition: all 0.2s ease; 
}
.cal-pop.open { opacity: 1; transform: translateY(0); pointer-events: all; }
.cal-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
.mnth { font-size: 14px; font-weight: 600; color: var(--text-main); cursor: pointer; padding: 4px 8px; border-radius: 6px; transition: background 0.2s; outline: none; }
.mnth:hover, .mnth:focus { background: var(--bg-hover); }
.cal-nav button { background: none; border: 1px solid var(--border-input); border-radius: 6px; width: 28px; height: 28px; cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--text-muted); transition: all 0.2s; outline: none;}
.cal-nav button:hover, .cal-nav button:focus { background: var(--bg-hover); color: var(--text-main);}

.cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; }
.cal-grid.years { grid-template-columns: repeat(3, 1fr); gap: 8px; }
.dn { font-size: 10px; font-weight: 600; text-transform: uppercase; color: var(--text-muted); text-align: center; padding-bottom: 8px; }
.cd { font-size: 13px; text-align: center; padding: 8px 2px; border-radius: 6px; cursor: pointer; color: var(--text-label); transition: all 0.15s; outline: none;}
.cal-grid.years .cd { padding: 12px 4px; font-weight: 500; }
.cd:hover, .cd:focus { background: var(--bg-hover); color: var(--text-main); }
.cd.sel { background: var(--accent-bg) !important; color: var(--accent-text) !important; font-weight: 500; }
.cd.today { font-weight: 700; color: var(--text-main); text-decoration: underline;}
.cd.om { color: var(--border-input); pointer-events: none; }

/* Status & Actions */
.status { margin: 24px 32px 0; font-size: 14px; padding: 12px 16px; border-radius: 8px; display: none; font-weight: 500; }
.status.error { background: rgba(239, 68, 68, 0.1); color: var(--danger-color); border: 1px solid rgba(239, 68, 68, 0.2); display: block; }
.status.success { background: rgba(34, 197, 94, 0.1); color: #15803d; border: 1px solid rgba(34, 197, 94, 0.2); display: block; }

.actions { display: flex; gap: 12px; padding: 24px 32px 32px; border-top: 1px solid var(--border-light); margin-top: 24px; }
.btn { flex: 1; height: 48px; border-radius: 8px; border: none; font-size: 15px; font-weight: 600; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; justify-content: center; font-family: 'Inter', sans-serif; outline: none;}
.btn:focus { box-shadow: 0 0 0 3px var(--focus-ring); }
.btn-inject { background: var(--accent-bg); color: var(--accent-text); }
.btn-inject:hover { opacity: 0.9; }
.btn-inject:disabled { opacity: 0.5; cursor: not-allowed; }
.btn-clear { background: var(--bg-active); color: var(--text-label); }
.btn-clear:hover { background: var(--border-input); color: var(--text-main); }
.no-file-msg { text-align: center; font-size: 14px; color: var(--text-muted); padding: 40px; font-weight: 500; }

/* Custom Modal Animation */
.modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.4); backdrop-filter: blur(3px); z-index: 9999; display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.2s ease; }
.modal-overlay.show { opacity: 1; pointer-events: all; }
.modal-box { background: var(--bg-card); border: 1px solid var(--border-light); border-radius: 12px; padding: 24px; width: 90%; max-width: 360px; box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1); transform: scale(0.95) translateY(10px); transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
.modal-overlay.show .modal-box { transform: scale(1) translateY(0); }
.modal-msg { font-size: 15px; color: var(--text-main); font-weight: 500; margin-bottom: 24px; line-height: 1.5; }
.modal-actions { display: flex; gap: 12px; justify-content: flex-end; }
.modal-btn { padding: 10px 16px; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.2s; border: none; font-family: 'Inter', sans-serif; outline: none; }
.modal-btn-cancel { background: var(--bg-active); color: var(--text-label); }
.modal-btn-cancel:hover, .modal-btn-cancel:focus { background: var(--border-input); color: var(--text-main); }
.modal-btn-ok { background: var(--danger-color); color: #fff; }
.modal-btn-ok:hover, .modal-btn-ok:focus { opacity: 0.9; box-shadow: 0 0 0 3px rgba(239, 68, 68, 0.2); }

/* 📱 MOBILE RESPONSIVENESS */
@media (max-width: 640px) {
  body { padding: 16px 10px; }
  .grid-wrap { grid-template-columns: 1fr; gap: 14px; }
  .card-header, .mode-wrap, .form-section, .actions, .history-wrap { padding-left: 20px; padding-right: 20px; }
  .actions { flex-direction: column-reverse; }
  .btn { min-height: 48px; width: 100%; } 
}


/* Ensure common form controls match letterhead look even if classes differ */
input, select, textarea {
  height:42px;
  padding:0 14px;
  border-radius:8px;
  border:1px solid var(--border, #d0d7de);
  font-size:14px;
  background:var(--bg-input, #fff);
}

input:focus, select:focus, textarea:focus {
  outline:none;
  box-shadow:0 0 0 3px var(--focus-ring, rgba(0,120,255,.25));
  border-color:var(--accent-bg, #0a84ff);
}

button {
  height:40px;
  border-radius:8px;
  padding:0 16px;
  border:1px solid transparent;
  cursor:pointer;
}

.btn-primary, .btn-p {
  background:var(--accent-bg, #0a84ff);
  color:#fff;
}

.btn-secondary, .btn-g {
  background:var(--bg-hover, #f2f4f7);
  border:1px solid var(--border-input, #d0d7de);
}

.btn-row, .form-actions {
  display:flex;
  gap:10px;
  justify-content:flex-end;
  margin-top:24px;
}
</style>

</head>
<body>
  <div id="toast"></div>
  <div id="loader"><div class="ld-card"><div class="spin"></div><p>Processing...</p></div></div>

  <div class="ph">
    <div>
      <div class="ph-title">Key Code Request Form</div>
      <div class="ph-sub">Multiple vehicles per export — shared fields apply to all rows</div>
    </div>
    <span class="chip"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>XLS Export</span>
  </div>

  <div class="card">
    <div class="card-title">
      <span style="display:flex;align-items:center;gap:7px;">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg>
        Shared Details
      </span>
      <span style="font-weight:400;color:var(--text3);font-size:12px;">(applies to all vehicles)</span>
    </div>
    <div class="fg c3">
      <div class="field"><label>Date <span class="req">*</span></label><input type="date" id="kc-date"></div>
      <div class="field"><label>Dealer Code</label><input type="text" id="kc-dcode" value="N3235" placeholder="e.g. N3235"></div>
      <div class="field"><label>Dealer Name</label><input type="text" id="kc-dname" value="KHANNA AUTOMART PVT. LTD." placeholder="Full dealer name"></div>
      <div class="field"><label>Requester Name <span class="req">*</span></label><input type="text" id="kc-rname" value="NARENDRA KUMAR" placeholder="e.g. NARENDRA KUMAR"></div>
      <div class="field"><label>Requester Contact No.</label><input type="tel" id="kc-rcontact" value="8979040022" placeholder="e.g. 8979040022"></div>
      <div class="field"><label>TPSM Name</label><input type="text" id="kc-tpsm" placeholder="e.g. AVINASH"></div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">
      <span style="display:flex;align-items:center;gap:7px;">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><rect x="1" y="3" width="15" height="13" rx="1"/><polygon points="16 8 20 8 23 11 23 16 16 16 16 8"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg>
        Vehicles
      </span>
      <button class="btn btn-g" style="padding:5px 12px;font-size:12px;" onclick="kcAddRow()">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg> Add Vehicle
      </button>
    </div>
    <div id="kc-rows"></div>
  </div>

  <div class="divhr"></div>
  <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-bottom:6px;">
    <span style="font-size:11.5px;color:var(--text3);" id="kc-save-status"></span>
    <button class="btn btn-g" style="padding:6px 12px;font-size:12px;" onclick="clearKcSaved()"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M10 11v6M14 11v6"/></svg> Clear Saved</button>
  </div>

  <div class="btn-row">
    <button class="btn btn-p" id="kc-exportBtn" onclick="exportKeyCode()"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>Export to Excel</button>
  </div>

  <script>
    // Theme sync listener
    window.addEventListener('message', (e) => {
      if (e.data && e.data.type === 'theme') {
        document.documentElement.setAttribute('data-theme', e.data.theme);
      }
    });

    const KC_SHARED_IDS = ["kc-date", "kc-dcode", "kc-dname", "kc-rname", "kc-rcontact", "kc-tpsm"];
    const KC_SAVE_KEY = "od_keycode_v1";
    let kcRows = [];

    function kcRowHTML(i, row = {}) {
      return `<div class="vrow" id="kcrow-${i}">
    <div class="vrow-num">VEHICLE ${i + 1}</div>
    <button class="vrow-rm" onclick="kcRemoveRow(${i})" title="Remove">
      <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
    <div class="fg c3">
      <div class="field s2"><label>Model</label><input type="text" class="kr-model" placeholder="e.g. VENUE 1.2 Kappa MT S" value="${row.model || ''}"></div>
      <div class="field"><label>Mileage (km)</label><input type="number" class="kr-mileage" placeholder="e.g. 76620" value="${row.mileage || ''}"></div>
      <div class="field s2"><label>VIN <span class="req">*</span></label><input type="text" class="kr-vin" placeholder="17-char VIN" style="font-family:var(--mono);font-size:12.5px;" value="${row.vin || ''}"></div>
      <div class="field"><label>RO No.</label><input type="text" class="kr-ro" placeholder="e.g. R202400947" value="${row.ro || ''}"></div>
      <div class="field s3"><label>Key Pin Code / Key Number</label><input type="text" class="kr-keycode" placeholder="Enter key pin code or key number" style="font-family:var(--mono);letter-spacing:.5px;" value="${row.keycode || ''}"></div>
    </div>
  </div>`;
    }

    function kcRenderRows() {
      const c = document.getElementById('kc-rows');
      if (!c) return;
      c.innerHTML = kcRows.map((r, i) => kcRowHTML(i, r)).join('');
      c.querySelectorAll('input').forEach(el => el.addEventListener('input', () => { kcReadRows(); kcScheduleSave(); }));
    }

    function kcReadRows() {
      const rows = document.querySelectorAll('#kc-rows .vrow');
      kcRows = Array.from(rows).map(row => ({
        model: row.querySelector('.kr-model')?.value.trim() || '',
        vin: row.querySelector('.kr-vin')?.value.trim() || '',
        mileage: row.querySelector('.kr-mileage')?.value.trim() || '',
        ro: row.querySelector('.kr-ro')?.value.trim() || '',
        keycode: row.querySelector('.kr-keycode')?.value.trim() || ''
      }));
    }

    function kcAddRow() {
      kcReadRows();
      kcRows.push({ model: '', vin: '', mileage: '', ro: '', keycode: '' });
      kcRenderRows();
      kcScheduleSave();
      const rows = document.querySelectorAll('#kc-rows .vrow');
      rows[rows.length - 1]?.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }

    function kcRemoveRow(i) {
      kcReadRows();
      if (kcRows.length <= 1) {
        toast('At least one vehicle required', 'info');
        return;
      }
      kcRows.splice(i, 1);
      kcRenderRows();
      kcScheduleSave();
    }

    let kcSaveTimer;
    function kcScheduleSave() {
      clearTimeout(kcSaveTimer);
      kcSaveTimer = setTimeout(kcSaveData, 600);
    }

    function kcSaveData() {
      kcReadRows();
      const shared = {};
      KC_SHARED_IDS.forEach(id => {
        const el = document.getElementById(id);
        if (el) shared[id] = el.value;
      });
      try {
        localStorage.setItem(KC_SAVE_KEY, JSON.stringify({ shared, rows: kcRows }));
      } catch (e) {}
      const el = document.getElementById('kc-save-status');
      if (el) el.textContent = 'Saved ' + new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    }

    function kcRestoreData() {
      try {
        const raw = localStorage.getItem(KC_SAVE_KEY);
        if (!raw) return false;
        const data = JSON.parse(raw);
        if (data.shared) KC_SHARED_IDS.forEach(id => {
          const el = document.getElementById(id);
          if (el && data.shared[id] !== undefined) el.value = data.shared[id];
        });
        if (data.rows && data.rows.length) kcRows = data.rows;
        return true;
      } catch (e) {
        return false;
      }
    }

    function clearKcSaved() {
      try {
        localStorage.removeItem(KC_SAVE_KEY);
      } catch (e) {}
      const el = document.getElementById('kc-save-status');
      if (el) {
        el.textContent = 'Cleared';
        setTimeout(() => { el.textContent = ''; }, 2000);
      }
      toast('Key code saved data cleared', 'info');
    }

    function kcSetDefaultDate() {
      const el = document.getElementById('kc-date');
      if (el && !el.value) {
        const t = new Date();
        el.value = t.toISOString().split('T')[0];
      }
    }

    function initKcForm() {
      if (!kcRows.length) kcRows = [{ model: '', vin: '', mileage: '', ro: '', keycode: '' }];
      kcSetDefaultDate();
      const restored = kcRestoreData();
      if (!restored) kcSetDefaultDate();
      kcRenderRows();
      const el = document.getElementById('kc-save-status');
      if (restored && el) el.textContent = 'Draft restored';
      KC_SHARED_IDS.forEach(id => {
        const el = document.getElementById(id);
        if (!el) return;
        el.addEventListener('input', kcScheduleSave);
        el.addEventListener('change', kcScheduleSave);
      });
    }

    async function exportKeyCode() {
      kcReadRows();
      const validRows = kcRows.filter(r => r.vin.trim());
      if (!validRows.length) {
        toast('At least one VIN is required', 'err');
        return;
      }
      const rname = document.getElementById('kc-rname')?.value.trim();
      if (!rname) {
        toast('Requester Name is required', 'err');
        return;
      }

      const btn = document.getElementById('kc-exportBtn');
      btn.disabled = true;
      showLoader(true);

      try {
        if (typeof ExcelJS === 'undefined') {
          await new Promise((res, rej) => {
            const s = document.createElement('script');
            s.src = 'https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.4.0/exceljs.min.js';
            s.onload = res;
            s.onerror = rej;
            document.head.appendChild(s);
          });
        }

        const g = id => document.getElementById(id)?.value.trim() || '';
        const date = g('kc-date'), dcode = g('kc-dcode'), dname = g('kc-dname');
        const rcontact = g('kc-rcontact'), tpsm = g('kc-tpsm');

        const HEADERS = ["S. No.", "Date", "Dealer Code", "Dealer Name", "Model", "VIN", "Mileage", "Ro No.", "Requester Name", "Requester Contact No.", "TPSM Name", "Key Pin Code or Key Number"];
        const WIDTHS = [6, 12, 13, 28, 22, 21, 10, 14, 17, 22, 14, 26];

        const wb = new ExcelJS.Workbook();
        const sheetName = (dcode || 'KeyCode').substring(0, 31);
        const ws = wb.addWorksheet(sheetName);

        ws.columns = WIDTHS.map((w, i) => ({ header: '', key: 'c' + i, width: w }));

        const hdrRow = ws.addRow(HEADERS);
        hdrRow.height = 30;
        hdrRow.eachCell(cell => {
          cell.font = { bold: true, size: 11, color: { argb: 'FFFFFFFF' } };
          cell.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FF00A550' } };
          cell.alignment = { horizontal: 'center', vertical: 'middle', wrapText: true };
          cell.border = {
            top: { style: 'thin', color: { argb: 'FF888888' } },
            bottom: { style: 'thin', color: { argb: 'FF888888' } },
            left: { style: 'thin', color: { argb: 'FF888888' } },
            right: { style: 'thin', color: { argb: 'FF888888' } }
          };
        });

        validRows.forEach((row, ri) => {
          const vals = [
            ri + 1, date, dcode, dname,
            row.model, row.vin,
            row.mileage ? parseInt(row.mileage) : '',
            row.ro, rname, rcontact, tpsm, row.keycode
          ];
          const dataRow = ws.addRow(vals);
          dataRow.height = 20;
          dataRow.eachCell({ includeEmpty: true }, cell => {
            cell.font = { size: 11 };
            cell.alignment = { horizontal: 'center', vertical: 'middle', wrapText: true };
            cell.border = {
              top: { style: 'thin', color: { argb: 'FFCCCCCC' } },
              bottom: { style: 'thin', color: { argb: 'FFCCCCCC' } },
              left: { style: 'thin', color: { argb: 'FFCCCCCC' } },
              right: { style: 'thin', color: { argb: 'FFCCCCCC' } }
            };
          });
        });

        const buf = await wb.xlsx.writeBuffer();
        const blob = new Blob([buf], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        const vinList = validRows.map(r => r.vin).join(',');
        a.download = `${vinList}_${dcode || 'DEALER'}.xlsx`;
        document.body.appendChild(a);
        a.click();
        a.remove();
        URL.revokeObjectURL(url);
        toast(`Excel downloaded — ${validRows.length} vehicle(s)`, 'ok');
      } catch (err) {
        toast('Export error: ' + err.message, 'err');
        console.error(err);
      } finally {
        showLoader(false);
        btn.disabled = false;
      }
    }

    let tt;
    function toast(msg, type) {
      const icons = {
        ok: '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>',
        err: '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>',
        info: '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>'
      };
      const el = document.getElementById("toast");
      el.className = "show " + (type || "info");
      el.innerHTML = (icons[type] || icons.info) + msg;
      clearTimeout(tt);
      tt = setTimeout(() => { el.className = ""; }, 3500);
    }

    function showLoader(s) {
      document.getElementById("loader").className = s ? "show" : "";
    }

    document.addEventListener("DOMContentLoaded", initKcForm);
  </script>
</body>
</html>
